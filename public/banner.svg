<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6fff0"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="logo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#82ea41"/>
      <stop offset="100%" stop-color="#326115"/>
    </linearGradient>
    <linearGradient id="vars" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="styles" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0v40" fill="none" stroke="#000" stroke-width="0.4" opacity="0.05"/>
    </pattern>
    <filter id="blur"><feGaussianBlur stdDeviation="60"/></filter>
  </defs>

  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#grid)"/>

  <circle cx="200" cy="120" r="110" fill="#82ea41" opacity="0.25" filter="url(#blur)"/>
  <circle cx="1000" cy="280" r="130" fill="#3b82f6" opacity="0.18" filter="url(#blur)"/>

  <!-- logo mark -->
  <g transform="translate(80,80)">
    <rect width="80" height="80" rx="20" fill="url(#logo)"/>
    <circle cx="26" cy="54" r="6.4" fill="white" opacity="0.95"/>
    <circle cx="40" cy="40" r="7.2" fill="white"/>
    <circle cx="54" cy="26" r="6.4" fill="white" opacity="0.85"/>
  </g>

  <!-- title -->
  <text x="200" y="130" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="800" fill="#0a0a0a">ShipIt Palette</text>
  <text x="200" y="165" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500" fill="#525252">Pick a color. Ship the palette.</text>

  <!-- big tagline -->
  <text x="80" y="270" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="800" fill="#0a0a0a">Design system </text>
  <text x="80" y="340" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="800" fill="url(#vars)">Variables</text>
  <text x="380" y="340" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="800" fill="#0a0a0a"> &amp; </text>
  <text x="450" y="340" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="800" fill="url(#styles)">Styles</text>
  <text x="630" y="340" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="800" fill="#0a0a0a"> Fast</text>

  <!-- swatches -->
  <g transform="translate(900,80)">
    <rect width="60" height="60" rx="14" fill="#cefebe"/>
    <rect x="70"  width="60" height="60" rx="14" fill="#98fd62"/>
    <rect x="140" width="60" height="60" rx="14" fill="#82ea41"/>
    <rect y="70"  width="60" height="60" rx="14" fill="#67bc32"/>
    <rect x="70"  y="70"  width="60" height="60" rx="14" fill="#44801f"/>
    <rect x="140" y="70"  width="60" height="60" rx="14" fill="#326115"/>
  </g>
</svg>
